name: Validate MRI Workflows
on:
  push:
    paths: ['workflows/**/*.yaml']
  pull_request:
    paths: ['workflows/**/*.yaml']
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - run: npm install -g agency-orchestrator
      - run: |
          for f in workflows/*.yaml; do
            echo "=== $f ===" && ao validate "$f" || exit 1
          done
          echo "✅ All 7 workflows valid"
